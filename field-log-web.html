<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIELD LOG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#14181b;
    --panel:#1b2023;
    --panel-2:#20262a;
    --line:#2c3337;
    --text:#e8e6de;
    --text-dim:#8b9198;
    --amber:#e8a33d;
    --amber-dim:#8a6526;
    --olive:#5c7a68;
    --rust:#c1523a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans',sans-serif;
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    opacity:0.05;
    background-image:
      repeating-radial-gradient(circle at 20% 30%, transparent 0, transparent 40px, var(--olive) 41px, transparent 42px),
      repeating-radial-gradient(circle at 85% 75%, transparent 0, transparent 60px, var(--olive) 61px, transparent 62px);
  }
  .wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 20px 60px;}

  /* ---------- Gate screens ---------- */
  .gate{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:22px;
    text-align:center;
    padding:20px;
  }
  .gate-mark{
    font-family:'IBM Plex Mono',monospace;
    color:var(--amber);
    font-size:12px;
    letter-spacing:3px;
    text-transform:uppercase;
  }
  .gate h1{
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:28px;
    letter-spacing:2px;
    text-transform:uppercase;
    margin:0;
    color:var(--text);
  }
  .gate input{
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    font-family:'IBM Plex Mono',monospace;
    font-size:18px;
    letter-spacing:4px;
    text-align:center;
    padding:14px 16px;
    border-radius:2px;
    width:220px;
    outline:none;
  }
  .gate input:focus{border-color:var(--amber);}
  .gate button{
    background:var(--amber);
    color:#1b1000;
    border:none;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    letter-spacing:1.5px;
    text-transform:uppercase;
    font-size:13px;
    padding:12px 28px;
    border-radius:2px;
    cursor:pointer;
  }
  .gate button:hover{background:#f0b158;}
  .gate .err{
    color:var(--rust);
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:1px;
    min-height:16px;
  }
  .gate .hint{
    color:var(--text-dim);
    font-size:12px;
    max-width:320px;
    line-height:1.5;
  }
  .shake{animation:shake 0.3s;}
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-8px);}
    75%{transform:translateX(8px);}
  }

  /* ---------- Header ---------- */
  header{
    padding:28px 0 18px;
    border-bottom:1px solid var(--line);
    margin-bottom:24px;
  }
  .callsign{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:3px;
    color:var(--amber);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  header h1{
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:26px;
    letter-spacing:1px;
    margin:0 0 14px;
    text-transform:uppercase;
  }
  .readout{
    display:flex;
    flex-wrap:wrap;
    gap:0;
    border:1px solid var(--line);
    border-radius:3px;
    overflow:hidden;
  }
  .readout-cell{
    flex:1;
    min-width:110px;
    padding:10px 14px;
    border-right:1px solid var(--line);
  }
  .readout-cell:last-child{border-right:none;}
  .readout-label{
    font-size:10px;
    letter-spacing:1.5px;
    color:var(--text-dim);
    text-transform:uppercase;
    margin-bottom:4px;
  }
  .readout-value{
    font-family:'IBM Plex Mono',monospace;
    font-size:16px;
    color:var(--text);
  }
  .readout-value.hot{color:var(--amber);}
  .readout-trend{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    margin-top:3px;
  }

  /* ---------- Tabs ---------- */
  .tabs{
    display:flex;
    gap:2px;
    margin-bottom:24px;
    border-bottom:1px solid var(--line);
  }
  .tab{
    font-family:'Oswald',sans-serif;
    font-size:13px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--text-dim);
    background:none;
    border:none;
    padding:10px 4px;
    margin-right:24px;
    cursor:pointer;
    border-bottom:2px solid transparent;
  }
  .tab.active{color:var(--amber);border-bottom-color:var(--amber);}
  .panel{display:none;}
  .panel.active{display:block;}

  /* ---------- Cards ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:14px;
    margin-bottom:28px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:3px;
    padding:16px 18px;
  }
  .card-label{
    font-size:10px;
    letter-spacing:1.5px;
    color:var(--text-dim);
    text-transform:uppercase;
    margin-bottom:8px;
  }
  .card-value{
    font-family:'IBM Plex Mono',monospace;
    font-size:26px;
    color:var(--text);
  }
  .card-value span{font-size:14px;color:var(--text-dim);margin-left:4px;}

  .section-title{
    font-family:'Oswald',sans-serif;
    font-size:15px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--text);
    margin:0 0 14px;
    padding-bottom:8px;
    border-bottom:1px solid var(--line);
  }
  .chart-box{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:3px;
    padding:18px;
    margin-bottom:20px;
    height:260px;
  }

  /* ---------- Forms ---------- */
  .form-toggle{
    display:flex;
    gap:8px;
    margin-bottom:18px;
  }
  .form-toggle button{
    flex:1;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text-dim);
    font-family:'Oswald',sans-serif;
    letter-spacing:1px;
    text-transform:uppercase;
    font-size:12px;
    padding:10px;
    border-radius:2px;
    cursor:pointer;
  }
  .form-toggle button.active{background:var(--amber-dim);color:var(--amber);border-color:var(--amber);}
  .form-toggle button:disabled{opacity:0.35;cursor:not-allowed;}
  .entry-form{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:3px;
    padding:20px;
    display:none;
  }
  .entry-form.active{display:block;}
  .dropzone{
    border:1px dashed var(--line);
    border-radius:3px;
    padding:18px;
    text-align:center;
    margin-bottom:16px;
    cursor:pointer;
    color:var(--text-dim);
    font-size:13px;
    transition:border-color 0.15s, color 0.15s;
  }
  .dropzone:hover, .dropzone.drag-over{border-color:var(--amber);color:var(--amber);}
  .dropzone.busy{border-color:var(--olive);color:var(--olive);}
  .dropzone .dz-sub{font-size:11px;color:var(--text-dim);margin-top:4px;}
  .dropzone img{max-height:80px;border-radius:2px;margin-bottom:8px;}
  .dz-status{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    margin-top:8px;
    min-height:14px;
  }
  .dz-status.err{color:var(--rust);}
  .dz-status.ok{color:var(--olive);}
  .preset-chip{
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    padding:6px 10px 6px 12px;
    border-radius:14px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .preset-chip:hover{border-color:var(--amber);color:var(--amber);}
  .preset-chip .chip-x{
    color:var(--text-dim);
    font-size:13px;
    line-height:1;
    padding:2px 4px;
  }
  .preset-chip .chip-x:hover{color:var(--rust);}
  #preset-name-input{
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    font-family:'IBM Plex Sans',sans-serif;
    font-size:13px;
    padding:0 12px;
    border-radius:2px;
  }
  .field-row{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:14px;
    margin-bottom:14px;
  }
  label{
    display:block;
    font-size:11px;
    letter-spacing:1px;
    color:var(--text-dim);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  input,select,textarea{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    font-family:'IBM Plex Sans',sans-serif;
    font-size:14px;
    padding:9px 10px;
    border-radius:2px;
    outline:none;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--amber);}
  textarea{resize:vertical;min-height:60px;}
  .submit-btn{
    background:var(--amber);
    color:#1b1000;
    border:none;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    letter-spacing:1.5px;
    text-transform:uppercase;
    font-size:13px;
    padding:11px 24px;
    border-radius:2px;
    cursor:pointer;
    width:100%;
  }
  .submit-btn:hover{background:#f0b158;}
  .save-msg{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--olive);
    margin-top:10px;
    min-height:16px;
  }

  /* ---------- History ---------- */
  .entry{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:3px;
    padding:14px 16px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
  }
  .entry-main{flex:1;}
  .entry-type{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--amber);
    margin-bottom:3px;
  }
  .entry-detail{font-size:13px;color:var(--text-dim);}
  .entry-date{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--text-dim);
    white-space:nowrap;
  }
  .del-btn{
    background:none;
    border:1px solid var(--line);
    color:var(--text-dim);
    font-size:11px;
    padding:6px 10px;
    border-radius:2px;
    cursor:pointer;
  }
  .del-btn:hover{border-color:var(--rust);color:var(--rust);}
  .empty-state{
    color:var(--text-dim);
    font-size:13px;
    padding:30px 0;
    text-align:center;
  }
  .loading{
    text-align:center;
    color:var(--text-dim);
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    padding:40px 0;
  }
</style>
</head>
<body>

<div id="root"></div>

<script>
(function(){

  // ---------- Supabase configuration ----------
  // Fill these in from your Supabase project: Settings > API
  var SUPABASE_URL = 'https://nbbooydgsrririeranjh.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_j6z9LiQMoTIs62Ry9v6Rpw_zu1NnyEj';
  var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  var root = document.getElementById('root');
  var state = {
    unlocked: false,
    configLoaded: false,
    authError: '',
    entries: [],
    diet: [],
    dietPresets: [],
    activeTab: 'overview',
    formType: 'cardio',
    editing: null,
    historyFilter: 'all'
  };

  function render(){
    if(!state.configLoaded){
      root.innerHTML = '<div class="loading">LOADING...</div>';
      return;
    }
    if(!state.unlocked){
      renderGate();
      return;
    }
    renderDashboard();
  }

  // ---------- Auth + data loading ----------
  async function authToken(){
    var { data } = await sb.auth.getSession();
    if(!data || !data.session) throw new Error('Not signed in');
    return data.session.access_token;
  }

  async function init(){
    var { data } = await sb.auth.getSession();
    if(data && data.session){
      state.unlocked = true;
      await loadAllData();
    }
    state.configLoaded = true;
    render();

    sb.auth.onAuthStateChange(function(event, session){
      if(event === 'SIGNED_OUT'){
        state.unlocked = false;
        state.entries = [];
        state.diet = [];
        state.dietPresets = [];
        render();
      }
    });
  }

  async function loadAllData(){
    var [entriesRes, dietRes, presetsRes] = await Promise.all([
      sb.from('entries').select('*').order('date', { ascending: false }),
      sb.from('diet').select('*').order('date', { ascending: false }),
      sb.from('diet_presets').select('*').order('created_at', { ascending: true })
    ]);
    state.entries = (entriesRes.data || []).map(rowToEntry);
    state.diet = (dietRes.data || []).map(rowToDiet);
    state.dietPresets = (presetsRes.data || []).map(function(r){ return { id: r.id, name: r.name, food: r.food }; });
  }

  function rowToEntry(row){
    return Object.assign({ id: row.id, type: row.type, date: row.date }, row.payload || {});
  }
  function rowToDiet(row){
    return Object.assign({ id: row.id, date: row.date }, row.payload || {});
  }
  function entryToPayload(entry){
    var p = {};
    Object.keys(entry).forEach(function(k){ if(k !== 'id' && k !== 'type' && k !== 'date') p[k] = entry[k]; });
    return p;
  }

  // ---------- Data mutation helpers (Supabase CRUD) ----------
  async function insertEntry(type, date, payload){
    var { data, error } = await sb.from('entries').insert({ type: type, date: date, payload: payload }).select().single();
    if(error) throw error;
    return rowToEntry(data);
  }
  async function updateEntryRow(id, type, date, payload){
    var { data, error } = await sb.from('entries').update({ type: type, date: date, payload: payload }).eq('id', id).select().single();
    if(error) throw error;
    return rowToEntry(data);
  }
  async function deleteEntryRow(id){
    var { error } = await sb.from('entries').delete().eq('id', id);
    if(error) throw error;
  }
  async function insertDiet(date, payload){
    var { data, error } = await sb.from('diet').insert({ date: date, payload: payload }).select().single();
    if(error) throw error;
    return rowToDiet(data);
  }
  async function updateDietRow(id, date, payload){
    var { data, error } = await sb.from('diet').update({ date: date, payload: payload }).eq('id', id).select().single();
    if(error) throw error;
    return rowToDiet(data);
  }
  async function deleteDietRow(id){
    var { error } = await sb.from('diet').delete().eq('id', id);
    if(error) throw error;
  }
  async function insertPreset(name, food){
    var { data, error } = await sb.from('diet_presets').insert({ name: name, food: food }).select().single();
    if(error) throw error;
    return { id: data.id, name: data.name, food: data.food };
  }
  async function deletePresetRow(id){
    var { error } = await sb.from('diet_presets').delete().eq('id', id);
    if(error) throw error;
  }

  // ---------- Gate (real Supabase email/password auth) ----------
  function renderGate(){
    root.innerHTML =
      '<div class="gate">' +
        '<div class="gate-mark">RESTRICTED ACCESS</div>' +
        '<h1>Field Log</h1>' +
        '<input id="gate-email" type="email" placeholder="EMAIL" autocomplete="username" style="letter-spacing:1px;">' +
        '<input id="gate-input" type="password" placeholder="PASSWORD" autocomplete="current-password">' +
        '<button id="gate-btn">Sign In</button>' +
        '<div class="err" id="gate-err"></div>' +
        '<div class="hint">Signed in with a real Supabase account. Sessions persist in this browser until you sign out.</div>' +
      '</div>';

    var emailInput = document.getElementById('gate-email');
    var input = document.getElementById('gate-input');
    var btn = document.getElementById('gate-btn');
    emailInput.focus();

    function attempt(){
      var email = emailInput.value.trim();
      var pass = input.value;
      if(!email || !pass){ showErr('Enter your email and password.'); return; }
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      sb.auth.signInWithPassword({ email: email, password: pass }).then(function(res){
        btn.disabled = false;
        btn.textContent = 'Sign In';
        if(res.error){
          showErr(res.error.message || 'Sign-in failed.');
          return;
        }
        state.unlocked = true;
        loadAllData().then(render);
      }).catch(function(err){
        btn.disabled = false;
        btn.textContent = 'Sign In';
        showErr(err && err.message ? err.message : 'Sign-in failed.');
      });
    }
    function showErr(msg){
      document.getElementById('gate-err').textContent = msg;
      var gateEl = document.querySelector('.gate');
      gateEl.classList.add('shake');
      setTimeout(function(){ gateEl.classList.remove('shake'); }, 300);
    }
    btn.addEventListener('click', attempt);
    input.addEventListener('keydown', function(e){ if(e.key === 'Enter') attempt(); });
    emailInput.addEventListener('keydown', function(e){ if(e.key === 'Enter') input.focus(); });
  }

  // ---------- Helpers for dashboard math ----------
  function parseLocalDate(dateStr){
    if(!dateStr) return new Date(NaN);
    var parts = dateStr.split('-');
    return new Date(parseInt(parts[0],10), parseInt(parts[1],10)-1, parseInt(parts[2],10));
  }
  function localDateStr(d){
    d = d || new Date();
    var y = d.getFullYear(), m = d.getMonth()+1, day = d.getDate();
    return y + '-' + (m<10?'0':'') + m + '-' + (day<10?'0':'') + day;
  }
  function daysAgo(n){
    var d = new Date();
    d.setHours(0,0,0,0);
    d.setDate(d.getDate() - n);
    return d;
  }
  function isWithinDays(dateStr, n){
    var d = parseLocalDate(dateStr);
    return d >= daysAgo(n);
  }
  function isToday(dateStr){
    var d = parseLocalDate(dateStr);
    var t = new Date();
    return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
  }
  function fmtDate(dateStr){
    var d = parseLocalDate(dateStr);
    return (d.getMonth()+1) + '/' + d.getDate();
  }
  function weekLabel(offset){
    var d = daysAgo(offset*7);
    return (d.getMonth()+1) + '/' + d.getDate();
  }
  async function commitEntry(arrName, entryData){
    var arr = state[arrName];
    if(state.editing && state.editing.arr === arrName){
      var id = state.editing.id;
      var savedRow = (arrName === 'entries')
        ? await updateEntryRow(id, entryData.type, entryData.date, entryToPayload(entryData))
        : await updateDietRow(id, entryData.date, entryToPayload(entryData));
      var idx = arr.findIndex(function(x){ return x.id === id; });
      if(idx !== -1){ arr[idx] = savedRow; } else { arr.push(savedRow); }
      state.editing = null;
      return true;
    }
    var newRow = (arrName === 'entries')
      ? await insertEntry(entryData.type, entryData.date, entryToPayload(entryData))
      : await insertDiet(entryData.date, entryToPayload(entryData));
    arr.push(newRow);
    return false;
  }

  function startEdit(kind, id){
    var arrName = kind === 'diet' ? 'diet' : 'entries';
    var entry = state[arrName].find(function(e){ return e.id === id; });
    if(!entry) return;
    state.editing = { arr: arrName, id: id };
    state.formType = kind === 'diet' ? 'diet' : entry.type;
    state.activeTab = 'log';
    updateTabs();
  }

  function epley1RM(weight, reps){
    var w = parseFloat(weight), r = parseFloat(reps);
    if(!w || !r) return null;
    return w * (1 + r/30);
  }

  function average(arr){
    if(!arr || !arr.length) return null;
    return arr.reduce(function(a,b){ return a+b; }, 0) / arr.length;
  }

  function dailyDietTotals(){
    var map = {};
    state.diet.forEach(function(e){
      if(!map[e.date]) map[e.date] = { date: e.date, calories: 0, protein: 0 };
      map[e.date].calories += parseFloat(e.calories) || 0;
      map[e.date].protein += parseFloat(e.protein) || 0;
    });
    return Object.keys(map).map(function(k){ return map[k]; })
      .sort(function(a,b){ return parseLocalDate(a.date) - parseLocalDate(b.date); });
  }

  function trendHtml(current, priorAvg){
    if(current === null || current === undefined || priorAvg === null || priorAvg === undefined || !priorAvg) return '';
    var dir = current > priorAvg ? 'up' : (current < priorAvg ? 'down' : 'flat');
    var arrow = dir === 'up' ? '▲' : (dir === 'down' ? '▼' : '–');
    var color = dir === 'up' ? 'var(--olive)' : (dir === 'down' ? 'var(--rust)' : 'var(--text-dim)');
    var pct = Math.round(((current - priorAvg) / priorAvg) * 100);
    var sign = pct > 0 ? '+' : '';
    return '<div class="readout-trend" style="color:' + color + ';">' + arrow + ' ' + sign + pct + '% vs 30d avg</div>';
  }

  function computeStats(){
    var zone2Minutes = state.entries.filter(function(e){
      return e.type === 'cardio' && isWithinDays(e.date, 7);
    }).reduce(function(sum, e){
      var avg = parseFloat(e.avgHR);
      if(avg >= 127 && avg <= 154){ return sum + (parseFloat(e.duration)||0); }
      return sum;
    }, 0);
    // Trend baseline: average weekly rate over the 30 days before the current 7-day window.
    var priorZone2Total = state.entries.filter(function(e){
      var d = parseLocalDate(e.date);
      return e.type === 'cardio' && d >= daysAgo(37) && d < daysAgo(7);
    }).reduce(function(sum, e){
      var avg = parseFloat(e.avgHR);
      if(avg >= 127 && avg <= 154){ return sum + (parseFloat(e.duration)||0); }
      return sum;
    }, 0);
    var zone2Trend = priorZone2Total > 0 ? priorZone2Total / (30/7) : null;

    var vo2Entries = state.entries.filter(function(e){ return e.type === 'vo2max'; })
      .sort(function(a,b){ return parseLocalDate(a.date) - parseLocalDate(b.date); });
    var latestVo2 = vo2Entries.length ? vo2Entries[vo2Entries.length-1].value : null;
    var priorVo2 = vo2Entries.slice(0, -1).filter(function(e){
      var d = parseLocalDate(e.date);
      return d >= daysAgo(30) && d < daysAgo(0);
    }).map(function(e){ return parseFloat(e.value); });
    var vo2Trend = average(priorVo2);

    var strengthTestEntries = state.entries.filter(function(e){ return e.type === 'strength_test'; })
      .sort(function(a,b){ return parseLocalDate(a.date) - parseLocalDate(b.date); });
    var latest1RM = strengthTestEntries.length ? epley1RM(strengthTestEntries[strengthTestEntries.length-1].weight, strengthTestEntries[strengthTestEntries.length-1].reps) : null;
    var priorRM = strengthTestEntries.slice(0, -1).filter(function(e){
      var d = parseLocalDate(e.date);
      return d >= daysAgo(30) && d < daysAgo(0);
    }).map(function(e){ return epley1RM(e.weight, e.reps); }).filter(function(v){ return v !== null; });
    var oneRMTrend = average(priorRM);

    var dietDaily = dailyDietTotals();
    var todayDiet = state.diet.filter(function(e){ return isToday(e.date); });
    var todayCalories = todayDiet.reduce(function(sum, e){ return sum + (parseFloat(e.calories)||0); }, 0);
    var todayProtein = todayDiet.reduce(function(sum, e){ return sum + (parseFloat(e.protein)||0); }, 0);
    var priorDiet = dietDaily.filter(function(d){
      var dd = parseLocalDate(d.date);
      return dd >= daysAgo(30) && dd < daysAgo(0);
    });
    var caloriesTrend = average(priorDiet.map(function(d){ return d.calories; }));
    var proteinTrend = average(priorDiet.map(function(d){ return d.protein; }));

    return {
      zone2Minutes: Math.round(zone2Minutes),
      zone2Trend: zone2Trend,
      latestVo2: latestVo2,
      vo2Entries: vo2Entries,
      vo2Trend: vo2Trend,
      latest1RM: latest1RM,
      strengthTestEntries: strengthTestEntries,
      oneRMTrend: oneRMTrend,
      dietDaily: dietDaily,
      todayCalories: Math.round(todayCalories),
      todayProtein: Math.round(todayProtein),
      todayDietCount: todayDiet.length,
      caloriesTrend: caloriesTrend,
      proteinTrend: proteinTrend
    };
  }

  function weeklyZone2Series(weeks){
    var buckets = [];
    for(var i = weeks-1; i >= 0; i--){
      var start = daysAgo((i+1)*7 - 1);
      var end = daysAgo(i*7 - 1);
      var total = state.entries.filter(function(e){
        var d = parseLocalDate(e.date);
        return e.type === 'cardio' && d >= start && d < end;
      }).reduce(function(sum, e){
        var avg = parseFloat(e.avgHR);
        if(avg >= 127 && avg <= 154){ return sum + (parseFloat(e.duration)||0); }
        return sum;
      }, 0);
      buckets.push({ label: weekLabel(i), value: Math.round(total) });
    }
    return buckets;
  }

    function updateLiveRM(){
      var rm = epley1RM(fieldVal(stForm,'weight'), fieldVal(stForm,'reps'));
      liveRM.textContent = rm ? Math.round(rm) + ' lb' : '—';
    }
    stForm.querySelector('[name="weight"]').addEventListener('input', updateLiveRM);
    stForm.querySelector('[name="reps"]').addEventListener('input', updateLiveRM);
    if(state.editing && state.formType === 'strength_test') updateLiveRM();
    stForm.querySelector('[data-save="strength_test"]').addEventListener('click', function(){
      if(!fieldVal(stForm,'date') || !fieldVal(stForm,'weight') || !fieldVal(stForm,'reps')){ flashMsg('strength_test','Date, weight, and reps are required.', true); return; }
      var entry = {
        type: 'strength_test', date: fieldVal(stForm,'date'),
        weight: fieldVal(stForm,'weight'), reps: fieldVal(stForm,'reps')
      };
      commitEntry('entries', entry).then(function(wasEditing){
        if(wasEditing){ state.activeTab = 'history'; updateTabs(); }
        else { flashMsg('strength_test','Saved.'); clearFields(stForm); updateLiveRM(); renderHeaderStats(); }
      }).catch(function(){ flashMsg('strength_test','Save failed, try again.', true); });
    });

    document.getElementById('form-vo2max').querySelector('[data-save="vo2max"]').addEventListener('click', function(){
      var c = document.getElementById('form-vo2max');
      if(!fieldVal(c,'date') || !fieldVal(c,'value')){ flashMsg('vo2max','Date and reading are required.', true); return; }
      var entry = { type: 'vo2max', date: fieldVal(c,'date'), value: fieldVal(c,'value'), source: fieldVal(c,'source') };
      commitEntry('entries', entry).then(function(wasEditing){
        if(wasEditing){ state.activeTab = 'history'; updateTabs(); }
        else { flashMsg('vo2max','Saved.'); clearFields(c); renderHeaderStats(); }
      }).catch(function(){ flashMsg('vo2max','Save failed, try again.', true); });
    });

    document.getElementById('form-diet').querySelector('[data-save="diet"]').addEventListener('click', function(){
      var c = document.getElementById('form-diet');
      if(!fieldVal(c,'date') || !fieldVal(c,'food')){ flashMsg('diet','Date and food description are required.', true); return; }
      var entry = { food: fieldVal(c,'food'), date: fieldVal(c,'date'), calories: fieldVal(c,'calories'), protein: fieldVal(c,'protein'), notes: fieldVal(c,'notes') };
      commitEntry('diet', entry).then(function(wasEditing){
        if(wasEditing){ state.activeTab = 'history'; updateTabs(); }
        else {
          flashMsg('diet','Saved.');
          clearFields(c);
          document.getElementById('diet-breakdown').innerHTML = '';
          document.getElementById('diet-estimate-status').textContent = '';
          renderHeaderStats();
        }
      }).catch(function(){ flashMsg('diet','Save failed, try again.', true); });
    });

    wireDropzone();
    wireDietEstimate();
  }

  // ---------- Screenshot import (uses Anthropic API to read workout screenshots) ----------
  function wireDropzone(){
    var dz = document.getElementById('dz-cardio');
    var fileInput = document.getElementById('shot-cardio');
    if(!dz || !fileInput) return;

    dz.addEventListener('click', function(){ fileInput.click(); });
    fileInput.addEventListener('change', function(){
      if(fileInput.files && fileInput.files[0]) handleShot(fileInput.files[0]);
    });
    dz.addEventListener('dragover', function(e){ e.preventDefault(); dz.classList.add('drag-over'); });
    dz.addEventListener('dragleave', function(){ dz.classList.remove('drag-over'); });
    dz.addEventListener('drop', function(e){
      e.preventDefault();
      dz.classList.remove('drag-over');
      if(e.dataTransfer.files && e.dataTransfer.files[0]) handleShot(e.dataTransfer.files[0]);
    });

    function setStatus(text, cls){
      var s = document.getElementById('dz-status-cardio');
      if(!s) return;
      s.textContent = text;
      s.className = 'dz-status' + (cls ? ' ' + cls : '');
    }

    function handleShot(file){
      var mimeOk = ['image/png','image/jpeg','image/webp'].indexOf(file.type) !== -1;
      if(!mimeOk){
        setStatus('Unsupported file type. Use a PNG, JPG, or WEBP screenshot.', 'err');
        return;
      }
      dz.classList.add('busy');
      setStatus('Reading screenshot...');
      var reader = new FileReader();
      reader.onload = function(){
        var base64 = reader.result.split(',')[1];
        extractWorkoutData(base64, file.type).then(function(data){
          fillCardioFields(data);
          dz.classList.remove('busy');
          setStatus('Extracted. Review the fields below, then save.', 'ok');
        }).catch(function(err){
          dz.classList.remove('busy');
          setStatus('Could not read the screenshot. Enter the numbers manually.', 'err');
          console.error(err);
        });
      };
      reader.readAsDataURL(file);
    }

    async function extractWorkoutData(base64, mimeType){
      var token = await authToken();
      var response = await fetch('/api/extract-workout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ imageBase64: base64, mimeType: mimeType })
      });
      if(!response.ok) throw new Error('Extraction request failed');
      return await response.json();
    }

    function fillCardioFields(data){
      var c = document.getElementById('form-cardio');
      if(!data) return;
      if(data.activity){
        var sel = c.querySelector('[name="activity"]');
        var opts = Array.prototype.map.call(sel.options, function(o){ return o.value; });
        if(opts.indexOf(data.activity) !== -1) sel.value = data.activity;
      }
      if(data.duration !== null && data.duration !== undefined) c.querySelector('[name="duration"]').value = Math.round(data.duration);
      if(data.distance !== null && data.distance !== undefined) c.querySelector('[name="distance"]').value = data.distance;
      if(data.avgHR !== null && data.avgHR !== undefined) c.querySelector('[name="avgHR"]').value = Math.round(data.avgHR);
      if(data.maxHR !== null && data.maxHR !== undefined) c.querySelector('[name="maxHR"]').value = Math.round(data.maxHR);
      if(data.calories !== null && data.calories !== undefined) c.querySelector('[name="calories"]').value = Math.round(data.calories);
    }
  }

  // ---------- Diet nutrition estimation (uses Anthropic API on the food description) ----------
  function wireDietEstimate(){
    var btn = document.getElementById('estimate-diet-btn');
    var foodField = document.querySelector('#form-diet [name="food"]');
    var statusEl = document.getElementById('diet-estimate-status');
    var breakdownEl = document.getElementById('diet-breakdown');
    if(!btn || !foodField) return;

    renderPresetChips();

    var nameInput = document.getElementById('preset-name-input');
    var saveBtn = document.getElementById('save-preset-btn');
    saveBtn.addEventListener('click', function(){
      var name = nameInput.value.trim();
      var food = foodField.value.trim();
      if(!name){ nameInput.focus(); return; }
      if(!food){ foodField.focus(); return; }
      saveBtn.disabled = true;
      insertPreset(name, food).then(function(preset){
        state.dietPresets.push(preset);
        nameInput.value = '';
        saveBtn.disabled = false;
        renderPresetChips();
      }).catch(function(){ saveBtn.disabled = false; });
    });
    nameInput.addEventListener('keydown', function(e){ if(e.key === 'Enter'){ e.preventDefault(); saveBtn.click(); } });

    function renderPresetChips(){
      var container = document.getElementById('preset-chips');
      if(!container) return;
      if(!state.dietPresets.length){
        container.innerHTML = '<div style="font-size:12px;color:var(--text-dim);">No quick meals saved yet. Type a meal above, name it, and save it for one-click logging next time.</div>';
        return;
      }
      container.innerHTML = state.dietPresets.map(function(p){
        return '<span class="preset-chip" data-preset="' + p.id + '">' + escapeHtml(p.name) + '<span class="chip-x" data-preset-del="' + p.id + '">&times;</span></span>';
      }).join('');
      container.querySelectorAll('[data-preset]').forEach(function(chip){
        chip.addEventListener('click', function(e){
          if(e.target.hasAttribute('data-preset-del')) return;
          var preset = state.dietPresets.find(function(p){ return p.id === chip.getAttribute('data-preset'); });
          if(!preset) return;
          var current = foodField.value.trim();
          foodField.value = current ? current + ', ' + preset.food : preset.food;
        });
      });
      container.querySelectorAll('[data-preset-del]').forEach(function(x){
        x.addEventListener('click', function(e){
          e.stopPropagation();
          var id = x.getAttribute('data-preset-del');
          deletePresetRow(id).then(function(){
            state.dietPresets = state.dietPresets.filter(function(p){ return p.id !== id; });
            renderPresetChips();
          });
        });
      });
    }

    btn.addEventListener('click', function(){
      var text = foodField.value.trim();
      if(!text){
        statusEl.textContent = 'Describe what you ate first.';
        statusEl.className = 'dz-status err';
        return;
      }
      btn.disabled = true;
      statusEl.textContent = 'Estimating...';
      statusEl.className = 'dz-status';
      breakdownEl.innerHTML = '';

      estimateNutrition(text).then(function(data){
        btn.disabled = false;
        var caloriesField = document.querySelector('#form-diet [name="calories"]');
        var proteinField = document.querySelector('#form-diet [name="protein"]');
        if(caloriesField) caloriesField.value = Math.round(data.totalCalories);
        if(proteinField) proteinField.value = Math.round(data.totalProtein);
        statusEl.textContent = 'Estimated from standard nutrition data. Adjust the numbers below if anything looks off.';
        statusEl.className = 'dz-status ok';
        if(data.items && data.items.length){
          breakdownEl.innerHTML = data.items.map(function(item){
            return '<div style="display:flex;justify-content:space-between;font-family:\'IBM Plex Mono\',monospace;font-size:12px;color:var(--text-dim);padding:4px 0;border-bottom:1px solid var(--line);">' +
              '<span>' + escapeHtml(item.name) + '</span>' +
              '<span>' + Math.round(item.calories) + ' cal &middot; ' + Math.round(item.protein) + 'g</span>' +
            '</div>';
          }).join('');
        }
      }).catch(function(err){
        btn.disabled = false;
        statusEl.textContent = 'Could not estimate. Enter calories and protein manually.';
        statusEl.className = 'dz-status err';
        console.error(err);
      });
    });
  }

  async function estimateNutrition(foodText){
    var token = await authToken();
    var response = await fetch('/api/estimate-nutrition', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ foodText: foodText })
    });
    if(!response.ok) throw new Error('Estimate request failed');
    return await response.json();
  }

  // ---------- History ----------
  var HISTORY_FILTERS = [
    { key: 'all', label: 'All' },
    { key: 'cardio', label: 'Cardio' },
    { key: 'strength', label: 'Strength' },
    { key: 'strength_test', label: 'Strength Test' },
    { key: 'vo2max', label: 'VO2 Max' },
    { key: 'diet', label: 'Diet' }
  ];

  function renderHistory(){
    var el = document.getElementById('panel-history');
    var all = state.entries.map(function(e){ return Object.assign({ _kind: 'entry' }, e); })
      .concat(state.diet.map(function(e){ return Object.assign({ _kind: 'diet', type: 'diet' }, e); }));
    all.sort(function(a,b){ return parseLocalDate(b.date) - parseLocalDate(a.date); });

    var filterRow = '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;">' +
      HISTORY_FILTERS.map(function(f){
        return '<button class="preset-chip" data-filter="' + f.key + '" style="border-radius:2px;' + (state.historyFilter===f.key ? 'border-color:var(--amber);color:var(--amber);' : '') + '">' + f.label + '</button>';
      }).join('') +
    '</div>';

    var filtered = state.historyFilter === 'all' ? all : all.filter(function(e){ return e.type === state.historyFilter; });

    if(all.length === 0){
      el.innerHTML = '<div class="empty-state">No entries logged yet. Head to Log Entry to start tracking.</div>';
      return;
    }

    el.innerHTML = filterRow + (filtered.length === 0 ? '<div class="empty-state">No entries in this category yet.</div>' : filtered.map(function(e){
      var detail = '';
      var label = '';
      if(e._kind === 'diet'){
        label = 'Diet';
        detail = (e.calories ? e.calories + ' cal' : '') + (e.protein ? ' &middot; ' + e.protein + 'g protein' : '') + (e.food ? ' &middot; ' + escapeHtml(e.food) : '') + (e.notes ? ' &middot; ' + escapeHtml(e.notes) : '');
      } else if(e.type === 'cardio'){
        label = e.activity || 'Cardio';
        detail = (e.duration ? e.duration + ' min' : '') + (e.distance ? ' &middot; ' + e.distance + ' mi' : '') + (e.avgHR ? ' &middot; avg ' + e.avgHR + ' bpm' : '') + (e.maxHR ? ' / max ' + e.maxHR + ' bpm' : '');
      } else if(e.type === 'strength'){
        label = 'Strength &middot; ' + (e.focus || '');
        detail = (e.duration ? e.duration + ' min' : '') + (e.notes ? ' &middot; ' + escapeHtml(e.notes) : '');
      } else if(e.type === 'vo2max'){
        label = 'VO2 Max Check';
        detail = e.value + ' ml/kg/min' + (e.source ? ' &middot; ' + e.source : '');
      } else if(e.type === 'strength_test'){
        label = 'Strength Test (Est. 1RM)';
        detail = Math.round(epley1RM(e.weight, e.reps)) + ' lb estimated &middot; ' + e.weight + ' lb x ' + e.reps + ' reps';
      }
      return '<div class="entry" data-id="' + e.id + '" data-kind="' + e._kind + '">' +
        '<div class="entry-main">' +
          '<div class="entry-type">' + label + '</div>' +
          '<div class="entry-detail">' + detail + '</div>' +
        '</div>' +
        '<div class="entry-date">' + fmtDate(e.date) + '</div>' +
        '<button class="del-btn" data-edit="' + e.id + '" data-kind="' + e._kind + '" style="margin-right:6px;">Edit</button>' +
        '<button class="del-btn" data-del="' + e.id + '" data-kind="' + e._kind + '">Delete</button>' +
      '</div>';
    }).join(''));

    el.querySelectorAll('[data-filter]').forEach(function(chip){
      chip.addEventListener('click', function(){
        state.historyFilter = chip.getAttribute('data-filter');
        renderHistory();
      });
    });

    el.querySelectorAll('[data-edit]').forEach(function(btn){
      btn.addEventListener('click', function(){
        startEdit(btn.getAttribute('data-kind'), btn.getAttribute('data-edit'));
      });
    });

    el.querySelectorAll('[data-del]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var id = btn.getAttribute('data-del');
        var kind = btn.getAttribute('data-kind');
        btn.disabled = true;
        if(kind === 'diet'){
          deleteDietRow(id).then(function(){
            state.diet = state.diet.filter(function(e){ return e.id !== id; });
            renderHistory();
            renderHeaderStats();
          }).catch(function(){ btn.disabled = false; });
        } else {
          deleteEntryRow(id).then(function(){
            state.entries = state.entries.filter(function(e){ return e.id !== id; });
            renderHistory();
            renderHeaderStats();
          }).catch(function(){ btn.disabled = false; });
        }
      });
    });
  }

  function escapeHtml(str){
    if(!str) return '';
    return str.replace(/[&<>"']/g, function(c){
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
  }

  init();
})();
</script>
